name: ReFocus
options:
  bundleIdPrefix: com.refocus
  deploymentTarget:
    iOS: 17.0
    macOS: 14.0

settings:
  SWIFT_VERSION: 5.9

targets:
  ReFocus:
    type: application
    platform: [iOS, macOS]
    sources:
      - Sources/ReFocus
    resources:
      - Sources/ReFocus/Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.refocus.app
      INFOPLIST_FILE: Sources/ReFocus/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
      SWIFT_VERSION: 5.9
      TARGETED_DEVICE_FAMILY: "1,2"
      SUPPORTS_MACCATALYST: false
      MACOSX_DEPLOYMENT_TARGET: 14.0
      IPHONEOS_DEPLOYMENT_TARGET: 17.0

  ReFocusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/ReFocusTests
    dependencies:
      - target: ReFocus_iOS
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.refocus.tests
      SWIFT_VERSION: 5.9
      GENERATE_INFOPLIST_FILE: YES

